model:
  backbone: resnet50          # Options: resnet50, efficientnet_b0
  num_classes: 3
  pretrained: true
  freeze_backbone: true       # Freeze backbone, train head only first
  unfreeze_epoch: 5           # Epoch to start fine-tuning backbone

training:
  batch_size: 16
  epochs: 15
  learning_rate: 0.001
  backbone_lr: 0.0001         # Lower LR for fine-tuning backbone
  weight_decay: 0.0001
  early_stopping_patience: 7
  scheduler: cosine           # Options: cosine, step, plateau
  step_size: 10               # For StepLR scheduler
  gamma: 0.1                  # For StepLR scheduler
  label_smoothing: 0.1

data:
  image_size: 224
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 0
  pin_memory: true

augmentation:
  horizontal_flip: 0.5
  rotation_limit: 15
  color_jitter: 0.4
  random_crop: 0.3
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  blur: 0.2

paths:
  raw_data: data/raw
  processed_data: data/processed
  saved_models: saved_models
  logs: logs
  best_model: saved_models/best_model.pth
  last_model: saved_models/last_model.pth

classes:
  - human
  - cartoon
  - ai_generated

class_names:
  human: "Real Human"
  cartoon: "Cartoon / Anime"
  ai_generated: "AI Generated"

inference:
  confidence_threshold: 0.5
  face_detection: true        # Optional OpenCV face crop before classify
  gradcam: true               # Generate Grad-CAM heatmap

api:
  host: 0.0.0.0
  port: 8000
  max_file_size_mb: 10
  allowed_extensions:
    - jpg
    - jpeg
    - png
    - webp
    - bmp
